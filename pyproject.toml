[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "commitforge"
version = "1.0.0"
description = "Offline, zero-dependency Git repository analyzer and conventional commit generator"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    {name = "CommitForge Contributors"},
]
keywords = ["git", "commit", "conventional-commits", "code-health", "offline"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

[project.scripts]
commitforge = "commitforge.cli:main"

[tool.setuptools.packages.find]
include = ["commitforge*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
